<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeMe – Inspeksi Peralatan</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{font-family:'Plus Jakarta Sans',sans-serif;}.fade-in{animation:fi .3s ease;}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.loader{border:3px solid #e2e8f0;border-top:3px solid #8b5cf6;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block;}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-6">
<div class="fade-in max-w-2xl mx-auto">
  <div class="mb-6">
    <div class="flex items-center gap-2 mb-1"><span class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">S</span><span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">SafeMe</span></div>
    <h1 class="text-2xl font-bold text-gray-900">🔧 Inspeksi Peralatan Kerja</h1>
    <p class="text-gray-500 text-sm mt-1">Form inspeksi peralatan dan mesin kerja</p>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <form id="form" onsubmit="submitForm(event)">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Nama Pelapor <span class="text-red-400">*</span></label><input type="text" id="reporter" required placeholder="Nama lengkap Anda" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 outline-none"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Nama Peralatan <span class="text-red-400">*</span></label><input type="text" id="equip-name" required placeholder="Contoh: Forklift, Mesin Produksi" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 outline-none"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">ID/Nomor Asset</label><input type="text" id="asset-id" placeholder="Contoh: AST-001" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 outline-none"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Departemen <span class="text-red-400">*</span></label><select id="department" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 bg-white outline-none"><option value="">Pilih Departemen</option><option>Lab/QC</option><option>Dyeing</option><option>Winding</option><option>Warehouse</option><option>HSE</option><option>GA</option><option>Utility &amp; Maintenance</option><option>Office</option></select></div>
        <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Lokasi <span class="text-red-400">*</span></label><input type="text" id="location" required placeholder="Contoh: Gudang B" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 outline-none"></div>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Checklist Inspeksi</label>
        <div class="bg-slate-50 rounded-xl p-4 space-y-2.5">
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Kondisi fisik baik (tidak ada kerusakan)</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Fungsi operasional normal</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Sistem keamanan berfungsi</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Label peringatan terpasang</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Maintenance terakhir sesuai jadwal</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded"><span class="text-sm">Dokumen/sertifikasi lengkap</span></label>
        </div>
      </div>
      <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Kondisi Keseluruhan <span class="text-red-400">*</span></label><select id="condition" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 bg-white outline-none"><option value="">Pilih Kondisi</option><option value="Baik">✅ Baik</option><option value="Perlu Perbaikan">⚠️ Perlu Perbaikan</option><option value="Tidak Layak Pakai">🚫 Tidak Layak Pakai</option></select></div>
      <div class="mb-6"><label class="block text-sm font-medium text-gray-700 mb-1">Catatan / Temuan</label><textarea id="notes" rows="3" placeholder="Jelaskan temuan atau masalah yang ditemukan" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-violet-400 resize-none outline-none"></textarea></div>
      <button type="submit" id="submit-btn" class="w-full py-3 text-white rounded-xl font-semibold transition-all flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">🔧 Kirim Laporan Inspeksi Peralatan</button>
    </form>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mt-4">
    <h3 class="font-semibold text-gray-800 mb-3 text-sm">📋 Laporan Peralatan Terbaru</h3>
    <div id="recent-list"><p class="text-xs text-gray-400 text-center py-4">Memuat data...</p></div>
  </div>
</div>
<div id="toast-ct" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
<script>
const API='https://script.google.com/macros/s/AKfycby91GOpZsa1wxU4pjn4GEAicb7palqP1j1hO6pKYU0dOUQfLvU8UDXwFG7e8cOjVgEX5g/exec';const KEY='safeme_reports';let reports=[];
function load(){try{reports=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){reports=[];}}
function save(){localStorage.setItem(KEY,JSON.stringify(reports));}
function genId(){return `sm-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;}
function fmtDT(v){if(!v)return'-';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function sCls(s){if(s==='Selesai')return'bg-green-100 text-green-800';if(s==='Diproses')return'bg-blue-100 text-blue-800';if(s==='Menunggu Konfirmasi')return'bg-yellow-100 text-yellow-800';return'bg-red-100 text-red-800';}
function getDT(){const n=new Date();const p=x=>String(x).padStart(2,'0');const o=-n.getTimezoneOffset();const sg=o>=0?'+':'-';const ah=p(Math.floor(Math.abs(o)/60)),am=p(Math.abs(o)%60);return`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}T${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}${sg}${ah}:${am}`;}
function toast(msg,t='success'){const c=document.getElementById('toast-ct');const el=document.createElement('div');el.className=`${t==='success'?'bg-emerald-500':'bg-red-500'} text-white px-5 py-3 rounded-xl shadow-lg text-sm fade-in`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
async function sync(rs){if(!rs.length)return;try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'syncAll',reports:rs.map(r=>({backendId:r.__backendId,date:r.report_date||'',type:r.type||'',category:r.category||'',reporter:r.reporter_name||'',department:r.department||'',location:r.location||'',status:r.status||'',priority:r.priority||'Normal',details:r.details||'',description:r.description||'',boxType:'',itemsStatus:'',adminNotes:r.admin_notes||'',completedDate:r.completed_date||'',photoUrl:''}))})});}catch(e){}}
function renderRecent(){const f=reports.filter(r=>r.type==='Inspeksi Peralatan').slice(0,5);const el=document.getElementById('recent-list');if(!f.length){el.innerHTML='<p class="text-xs text-gray-400 text-center py-4">Belum ada laporan peralatan</p>';return;}el.innerHTML='<div class="space-y-2">'+f.map(r=>`<div class="flex items-center justify-between bg-slate-50 rounded-xl p-3"><div><p class="text-sm font-semibold text-gray-800">${r.category||'-'} – ${r.details||''}</p><p class="text-xs text-gray-500">${r.location||r.department} · ${fmtDT(r.report_date)}</p></div><span class="text-xs font-semibold px-2 py-1 rounded-full ${sCls(r.status)}">${r.status}</span></div>`).join('')+'</div>';}
async function submitForm(e){
  e.preventDefault();const btn=document.getElementById('submit-btn');
  if(reports.length>=999){toast('Batas 999 laporan tercapai','error');return;}
  btn.disabled=true;btn.innerHTML='<div class="loader"></div> Mengirim...';
  const cond=document.getElementById('condition').value;
  const r={__backendId:genId(),type:'Inspeksi Peralatan',category:document.getElementById('equip-name').value.trim(),location:document.getElementById('location').value.trim(),department:document.getElementById('department').value,reporter_name:document.getElementById('reporter').value.trim(),report_date:getDT(),status:cond==='Baik'?'Selesai':cond,details:`Asset ID: ${document.getElementById('asset-id').value.trim()||'-'}`,description:document.getElementById('notes').value.trim()||'-',priority:cond==='Tidak Layak Pakai'?'Tinggi':'Normal',admin_notes:'',completed_date:'',photo_url:''};
  load();reports=[r,...reports];save();await sync(reports);renderRecent();
  btn.disabled=false;btn.innerHTML='🔧 Kirim Laporan Inspeksi Peralatan';
  toast('Laporan inspeksi peralatan berhasil dikirim!');document.getElementById('form').reset();
}
load();renderRecent();
</script>
</body>
</html>
