<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTrack – Inspeksi APAR</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .loader { border:3px solid #f3f3f3; border-top:3px solid #10b981; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  input:focus, select:focus, textarea:focus { outline:none; }
</style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-6">

<div class="fade-in max-w-2xl mx-auto">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">🧯 Inspeksi APAR</h1>
    <p class="text-gray-500 text-sm mt-1">Form inspeksi Alat Pemadam Api Ringan</p>
  </div>

  <!-- User Info Bar -->
  <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 mb-5 flex items-center gap-3">
    <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold text-sm" id="user-avatar">?</div>
    <div>
      <p class="text-sm font-medium text-gray-800" id="user-name">Nama tidak tersedia</p>
      <p class="text-xs text-gray-500" id="user-dept">—</p>
    </div>
    <span class="ml-auto text-xs text-emerald-600 bg-emerald-100 px-2 py-1 rounded-lg">⚡ Aktif</span>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <form id="apar-form" onsubmit="submitForm(event)">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pelapor <span class="text-red-400">*</span></label>
          <input type="text" id="reporter" required placeholder="Nama lengkap Anda"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 bg-white">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Departemen <span class="text-red-400">*</span></label>
          <select id="department" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 bg-white">
            <option value="">Pilih Departemen</option>
            <option>Lab/QC</option><option>Dyeing</option><option>Winding</option>
            <option>Warehouse</option><option>HSE</option><option>GA</option>
            <option>Utility &amp; Maintenance</option><option>Office</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi APAR <span class="text-red-400">*</span></label>
          <input type="text" id="location" required placeholder="Contoh: Gedung A Lt. 2"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nomor APAR <span class="text-red-400">*</span></label>
          <input type="text" id="apar-number" required placeholder="Contoh: APAR-001"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Jenis APAR <span class="text-red-400">*</span></label>
          <select id="apar-type" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 bg-white">
            <option value="">Pilih Jenis</option>
            <option>Powder</option><option>CO2</option><option>Foam</option><option>Air</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Kadaluarsa <span class="text-red-400">*</span></label>
          <input type="date" id="expiry-date" required
            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400">
        </div>
      </div>

      <!-- Checklist -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Checklist Inspeksi</label>
        <div class="bg-gray-50 rounded-xl p-4 space-y-2.5">
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Segel dalam kondisi baik</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Pin pengaman terpasang</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Tekanan dalam kondisi baik (jarum di area hijau)</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Selang dalam kondisi baik</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Nozzle tidak tersumbat</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Label petunjuk terbaca jelas</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded text-emerald-500"><span class="text-sm text-gray-700">Posisi mudah dijangkau</span></label>
        </div>
      </div>

      <!-- Kondisi -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi Keseluruhan <span class="text-red-400">*</span></label>
        <select id="condition" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 bg-white">
          <option value="">Pilih Kondisi</option>
          <option value="Baik">✅ Baik</option>
          <option value="Perlu Perbaikan">⚠️ Perlu Perbaikan</option>
          <option value="Tidak Layak Pakai">🚫 Tidak Layak Pakai</option>
        </select>
      </div>

      <!-- Notes -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
        <textarea id="notes" rows="3" placeholder="Tambahkan catatan jika diperlukan"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 resize-none"></textarea>
      </div>

      <button type="submit" id="submit-btn"
        class="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-xl font-semibold hover:from-emerald-600 hover:to-teal-600 transition-all flex items-center justify-center gap-2">
        🧯 Kirim Laporan Inspeksi APAR
      </button>
    </form>
  </div>

  <!-- Recent Reports -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mt-5">
    <h3 class="font-semibold text-gray-800 mb-3 text-sm">📋 Laporan APAR Terbaru</h3>
    <div id="recent-list"><p class="text-xs text-gray-400 text-center py-4">Memuat data...</p></div>
  </div>
</div>

<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

<script>
const GOOGLE_SHEETS_API = 'https://script.google.com/macros/s/AKfycbzTG9Hs62r2eDumzLAFvgLDwdUHBLQV-5tC12XajU0u_dY2Y8PPq-US2GXiycsEzav7/exec';
const LOCAL_KEY = 'safetrack_reports';
let allReports = [];

function loadLocal(){ try{allReports=JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]');}catch(e){allReports=[];} }
function saveLocal(){ localStorage.setItem(LOCAL_KEY,JSON.stringify(allReports)); }
function genId(){ return `local-${Date.now()}-${Math.random().toString(36).slice(2,8)}`; }
function formatDT(v){ if(!v)return'-'; const d=new Date(v); return isNaN(d.getTime())?String(v):d.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function getStatusClass(s){ if(s==='Menunggu Konfirmasi')return'bg-yellow-100 text-yellow-800'; if(s==='Diproses')return'bg-blue-100 text-blue-800'; if(s==='Selesai')return'bg-green-100 text-green-800'; return'bg-red-100 text-red-800'; }

function getDateTime(){
  const now=new Date(); const pad=n=>String(n).padStart(2,'0');
  const off=-now.getTimezoneOffset(); const sign=off>=0?'+':'-'; const ah=pad(Math.floor(Math.abs(off)/60)),am=pad(Math.abs(off)%60);
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}${sign}${ah}:${am}`;
}

function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className=`${type==='success'?'bg-emerald-500':'bg-red-500'} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 fade-in text-sm`;
  el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3500);
}

async function syncSheets(reports){
  if(!reports.length) return;
  try {
    await fetch(GOOGLE_SHEETS_API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'syncAll',reports:reports.map(r=>({
        backendId:r.__backendId,date:r.report_date||'',type:r.type||'',category:r.category||'',
        reporter:r.reporter_name||'',department:r.department||'',location:r.location||'',
        status:r.status||'',priority:r.priority||'Normal',details:r.details||'',
        description:r.description||'',boxType:r.box_type||'',itemsStatus:r.items_status||'',
        adminNotes:r.admin_notes||'',completedDate:r.completed_date||''
      }))})});
  } catch(e){console.warn('sync failed',e);}
}

async function fetchCloud(){
  try {
    const r=await fetch(`${GOOGLE_SHEETS_API}?action=getReports&_=${Date.now()}`,{mode:'cors',cache:'no-store'});
    if(!r.ok)throw new Error();
    const p=await r.json();
    if(p.status!=='success'||!Array.isArray(p.reports))throw new Error();
    return p.reports.filter(r=>r.__backendId);
  } catch(e) {
    return new Promise((res,rej)=>{
      const cb=`stJ_${Date.now()}`;
      const s=document.createElement('script');
      const clean=()=>{s.parentNode?.removeChild(s);delete window[cb];};
      window[cb]=p=>{clean();p?.status==='success'&&Array.isArray(p.reports)?res(p.reports.filter(r=>r.__backendId)):rej();};
      s.onerror=()=>{clean();res([]);};
      s.src=`${GOOGLE_SHEETS_API}?action=getReports&callback=${cb}&_=${Date.now()}`;
      document.body.appendChild(s);
    }).catch(()=>[]);
  }
}

function renderRecent(){
  const filtered = allReports.filter(r=>r.type==='Inspeksi APAR').slice(0,5);
  const el = document.getElementById('recent-list');
  if(!filtered.length){ el.innerHTML='<p class="text-xs text-gray-400 text-center py-4">Belum ada laporan APAR</p>'; return; }
  el.innerHTML = '<div class="space-y-2">'+filtered.map(r=>`
    <div class="flex items-center justify-between bg-gray-50 rounded-lg p-3">
      <div>
        <p class="text-sm font-medium text-gray-800">${r.category||'-'} – ${r.details||''}</p>
        <p class="text-xs text-gray-500">${r.location||r.department} · ${formatDT(r.report_date)}</p>
      </div>
      <span class="text-xs font-semibold px-2 py-1 rounded-full ${getStatusClass(r.status)}">${r.status}</span>
    </div>
  `).join('')+'</div>';
}

async function submitForm(e){
  e.preventDefault();
  const btn=document.getElementById('submit-btn');
  const reporter=document.getElementById('reporter').value.trim();
  const dept=document.getElementById('department').value;
  const loc=document.getElementById('location').value.trim();
  const num=document.getElementById('apar-number').value.trim();
  const type=document.getElementById('apar-type').value;
  const exp=document.getElementById('expiry-date').value;
  const cond=document.getElementById('condition').value;
  const notes=document.getElementById('notes').value.trim();

  if(allReports.length>=999){ showToast('Batas maksimum 999 laporan tercapai','error'); return; }

  btn.disabled=true;
  btn.innerHTML='<div class="loader"></div> Mengirim...';

  const report = {
    __backendId: genId(),
    type: 'Inspeksi APAR',
    category: type,
    location: loc,
    department: dept,
    reporter_name: reporter,
    report_date: getDateTime(),
    status: cond==='Baik'?'Selesai':cond,
    details: `No: ${num}, Exp: ${exp}`,
    description: notes||'-',
    priority: cond==='Tidak Layak Pakai'?'Tinggi':'Normal',
    admin_notes: '', completed_date: ''
  };

  loadLocal();
  allReports = [report, ...allReports];
  saveLocal();
  await syncSheets(allReports);
  renderRecent();

  btn.disabled=false;
  btn.innerHTML='🧯 Kirim Laporan Inspeksi APAR';
  showToast('Laporan inspeksi APAR berhasil dikirim!');
  document.getElementById('apar-form').reset();
}

// Init
loadLocal();
renderRecent();
// Background cloud sync
fetchCloud().then(cloud=>{
  const m=new Map(); cloud.forEach(r=>m.set(r.__backendId,r)); allReports.forEach(r=>{if(r.__backendId&&!m.has(r.__backendId))m.set(r.__backendId,r);});
  allReports=Array.from(m.values()).sort((a,b)=>new Date(b.report_date||0)-new Date(a.report_date||0));
  saveLocal(); renderRecent();
}).catch(()=>{});
</script>
</body>
</html>
