<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTrack – Kondisi Tidak Aman</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>* { font-family: 'Plus Jakarta Sans', sans-serif; } .fade-in { animation: fadeIn .3s ease; } @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} } .loader { border:3px solid #f3f3f3; border-top:3px solid #f59e0b; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite; display:inline-block; } @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} } .severity-btn { border:2px solid; padding:8px 16px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; } .severity-btn.selected-low { background:#dcfce7; border-color:#16a34a; color:#15803d; } .severity-btn.selected-medium { background:#fef9c3; border-color:#ca8a04; color:#a16207; } .severity-btn.selected-high { background:#fee2e2; border-color:#dc2626; color:#b91c1c; } .severity-btn:not(.selected-low):not(.selected-medium):not(.selected-high) { background:#f8fafc; border-color:#e2e8f0; color:#64748b; }</style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-6">
<div class="fade-in max-w-2xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">🚨 Laporan Kondisi Tidak Aman</h1>
    <p class="text-gray-500 text-sm mt-1">Laporkan kondisi berbahaya yang Anda temukan di tempat kerja</p>
  </div>
  <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-5">
    <p class="text-sm text-amber-800 font-medium">⚡ Jika kondisi sangat berbahaya dan memerlukan penanganan segera, hubungi HSE langsung!</p>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <form id="form" onsubmit="submitForm(event)">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pelapor <span class="text-red-400">*</span></label>
          <input type="text" id="reporter" required placeholder="Nama lengkap Anda" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kategori Kondisi <span class="text-red-400">*</span></label>
          <select id="category" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400 bg-white">
            <option value="">Pilih Kategori</option>
            <option>Lantai Licin/Basah</option>
            <option>Instalasi Listrik Berbahaya</option>
            <option>Kebocoran (Gas/Cairan)</option>
            <option>Peralatan Rusak</option>
            <option>Pencahayaan Kurang</option>
            <option>Tumpahan Bahan Kimia</option>
            <option>Akses Darurat Terhalang</option>
            <option>Lainnya</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Departemen <span class="text-red-400">*</span></label>
          <select id="department" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400 bg-white">
            <option value="">Pilih Departemen</option>
            <option>Lab/QC</option><option>Dyeing</option><option>Winding</option>
            <option>Warehouse</option><option>HSE</option><option>GA</option>
            <option>Utility &amp; Maintenance</option><option>Office</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Spesifik <span class="text-red-400">*</span></label>
          <input type="text" id="location" required placeholder="Contoh: Lantai 2 dekat toilet" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400">
        </div>
      </div>

      <!-- Severity Selector -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Tingkat Bahaya <span class="text-red-400">*</span></label>
        <input type="hidden" id="severity" required>
        <div class="flex gap-3">
          <button type="button" onclick="setSeverity('Rendah')" id="sev-low" class="severity-btn flex-1">
            🟢 Rendah<br><span class="text-xs font-normal">Cedera ringan</span>
          </button>
          <button type="button" onclick="setSeverity('Sedang')" id="sev-med" class="severity-btn flex-1">
            🟡 Sedang<br><span class="text-xs font-normal">Cedera serius</span>
          </button>
          <button type="button" onclick="setSeverity('Tinggi')" id="sev-high" class="severity-btn flex-1">
            🔴 Tinggi<br><span class="text-xs font-normal">Fatal/kritis</span>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi Kondisi <span class="text-red-400">*</span></label>
        <textarea id="description" rows="4" required placeholder="Jelaskan kondisi tidak aman yang Anda temukan secara detail..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Saran Perbaikan</label>
        <textarea id="suggestion" rows="2" placeholder="Berikan saran untuk memperbaiki kondisi ini (opsional)" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
      </div>
      <button type="submit" id="submit-btn" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl font-semibold hover:from-amber-600 hover:to-orange-600 transition-all flex items-center justify-center gap-2">
        🚨 Kirim Laporan Kondisi Tidak Aman
      </button>
    </form>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mt-5">
    <h3 class="font-semibold text-gray-800 mb-3 text-sm">📋 Laporan Terbaru</h3>
    <div id="recent-list"><p class="text-xs text-gray-400 text-center py-4">Memuat data...</p></div>
  </div>
</div>
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
<script>
const API='https://script.google.com/macros/s/AKfycbzTG9Hs62r2eDumzLAFvgLDwdUHBLQV-5tC12XajU0u_dY2Y8PPq-US2GXiycsEzav7/exec';
const KEY='safetrack_reports';let reports=[];

function setSeverity(val){
  document.getElementById('severity').value=val;
  ['low','med','high'].forEach(k=>{const el=document.getElementById('sev-'+k);el.className='severity-btn flex-1';});
  if(val==='Rendah')document.getElementById('sev-low').className='severity-btn flex-1 selected-low';
  else if(val==='Sedang')document.getElementById('sev-med').className='severity-btn flex-1 selected-medium';
  else document.getElementById('sev-high').className='severity-btn flex-1 selected-high';
}
function load(){try{reports=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){reports=[];}}
function save(){localStorage.setItem(KEY,JSON.stringify(reports));}
function genId(){return `local-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;}
function fmtDT(v){if(!v)return'-';const d=new Date(v);return isNaN(d.getTime())?String(v):d.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function statusCls(s){if(s==='Selesai')return'bg-green-100 text-green-800';if(s==='Diproses')return'bg-blue-100 text-blue-800';if(s==='Menunggu Konfirmasi')return'bg-yellow-100 text-yellow-800';return'bg-red-100 text-red-800';}
function getDT(){const now=new Date();const pad=n=>String(n).padStart(2,'0');const off=-now.getTimezoneOffset();const sign=off>=0?'+':'-';const ah=pad(Math.floor(Math.abs(off)/60)),am=pad(Math.abs(off)%60);return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}${sign}${ah}:${am}`;}
function toast(msg,type='success'){const c=document.getElementById('toast-container');const el=document.createElement('div');el.className=`${type==='success'?'bg-emerald-500':'bg-red-500'} text-white px-5 py-3 rounded-xl shadow-lg text-sm fade-in`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
async function sync(rs){if(!rs.length)return;try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'syncAll',reports:rs.map(r=>({backendId:r.__backendId,date:r.report_date||'',type:r.type||'',category:r.category||'',reporter:r.reporter_name||'',department:r.department||'',location:r.location||'',status:r.status||'',priority:r.priority||'Normal',details:r.details||'',description:r.description||'',boxType:'',itemsStatus:'',adminNotes:'',completedDate:''}))})});}catch(e){}}
function renderRecent(){const f=reports.filter(r=>r.type==='Kondisi Tidak Aman').slice(0,5);const el=document.getElementById('recent-list');if(!f.length){el.innerHTML='<p class="text-xs text-gray-400 text-center py-4">Belum ada laporan</p>';return;}el.innerHTML='<div class="space-y-2">'+f.map(r=>`<div class="flex items-center justify-between bg-gray-50 rounded-lg p-3"><div><p class="text-sm font-medium text-gray-800">${r.category||'-'}</p><p class="text-xs text-gray-500">${r.location||r.department} · ${fmtDT(r.report_date)}</p></div><span class="text-xs font-semibold px-2 py-1 rounded-full ${statusCls(r.status)}">${r.status}</span></div>`).join('')+'</div>';}
async function submitForm(e){
  e.preventDefault();
  const sev=document.getElementById('severity').value;
  if(!sev){toast('Pilih tingkat bahaya terlebih dahulu','error');return;}
  const btn=document.getElementById('submit-btn');
  if(reports.length>=999){toast('Batas 999 laporan tercapai','error');return;}
  btn.disabled=true;btn.innerHTML='<div class="loader"></div> Mengirim...';
  const r={__backendId:genId(),type:'Kondisi Tidak Aman',category:document.getElementById('category').value,location:document.getElementById('location').value.trim(),department:document.getElementById('department').value,reporter_name:document.getElementById('reporter').value.trim(),report_date:getDT(),status:'Menunggu Konfirmasi',details:`Tingkat: ${sev}`,description:document.getElementById('description').value.trim(),priority:sev,admin_notes:'',completed_date:''};
  load();reports=[r,...reports];save();await sync(reports);renderRecent();
  btn.disabled=false;btn.innerHTML='🚨 Kirim Laporan Kondisi Tidak Aman';
  toast('Laporan kondisi tidak aman berhasil dikirim!');
  document.getElementById('form').reset();
  ['low','med','high'].forEach(k=>{document.getElementById('sev-'+k).className='severity-btn flex-1';});
  document.getElementById('severity').value='';
}
load();renderRecent();
</script>
</body>
</html>
