<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTrack – Kelola Laporan (Admin)</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .loader { border:3px solid #f3f3f3; border-top:3px solid #3b82f6; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  .modal-overlay { background:rgba(0,0,0,.5); backdrop-filter:blur(4px); }
  .status-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .status-waiting { background:#fef3c7; color:#92400e; }
  .status-processing { background:#dbeafe; color:#1e40af; }
  .status-completed { background:#d1fae5; color:#065f46; }
  .status-needs-attention { background:#fee2e2; color:#991b1b; }
  #login-screen { min-height: 100vh; }
</style>
</head>
<body class="bg-gray-50">

<!-- Login Screen -->
<div id="login-screen" class="flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full fade-in">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800">Admin Login</h2>
      <p class="text-sm text-gray-500">Kelola Laporan SafeTrack</p>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Admin</label>
        <input type="text" id="admin-name" placeholder="Nama Anda" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="admin-pass" placeholder="Password admin" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button onclick="doLogin()" class="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl font-semibold hover:from-blue-600 hover:to-indigo-600 transition-all">
        Masuk sebagai Admin
      </button>
      <p class="text-xs text-center text-gray-400">Default password: <strong>admin123</strong></p>
    </div>
  </div>
</div>

<!-- Main Admin Panel -->
<div id="admin-panel" class="hidden p-4 md:p-6 fade-in">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">⚙️ Kelola Laporan</h1>
      <p class="text-gray-500 text-sm" id="welcome-text">Selamat datang, Admin!</p>
    </div>
    <div class="flex gap-2 flex-wrap">
      <button onclick="refreshData()" class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-sm font-medium hover:bg-emerald-600 flex items-center gap-1">
        🔄 Refresh Data
      </button>
      <button onclick="doLogout()" class="px-4 py-2 bg-red-100 text-red-600 rounded-xl text-sm font-medium hover:bg-red-200">
        Keluar
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
      <p class="text-xs text-gray-500 mb-1">Total</p>
      <p id="s-total" class="text-2xl font-bold text-gray-800">0</p>
    </div>
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
      <p class="text-xs text-gray-500 mb-1">Menunggu</p>
      <p id="s-waiting" class="text-2xl font-bold text-amber-500">0</p>
    </div>
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
      <p class="text-xs text-gray-500 mb-1">Selesai</p>
      <p id="s-done" class="text-2xl font-bold text-emerald-500">0</p>
    </div>
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
      <p class="text-xs text-gray-500 mb-1">Perlu Perhatian</p>
      <p id="s-attention" class="text-2xl font-bold text-red-500">0</p>
    </div>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
    <div class="flex flex-wrap gap-3 items-center">
      <select id="filter-type" onchange="renderTable()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none">
        <option value="">Semua Tipe</option>
        <option>Inspeksi APAR</option><option>Inspeksi Hydrant</option><option>Inspeksi P3K</option>
        <option>Inspeksi Peralatan</option><option>Permit Kerja</option><option>JSA</option>
        <option>Kondisi Tidak Aman</option><option>Request APD</option><option>Saran Lainnya</option>
      </select>
      <select id="filter-status" onchange="renderTable()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none">
        <option value="">Semua Status</option>
        <option>Menunggu Konfirmasi</option><option>Diproses</option><option>Selesai</option>
        <option>Perlu Perbaikan</option><option>Perlu Isi Ulang</option><option>Tidak Layak Pakai</option>
      </select>
      <select id="filter-dept" onchange="renderTable()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none">
        <option value="">Semua Departemen</option>
        <option>Lab/QC</option><option>Dyeing</option><option>Winding</option>
        <option>Warehouse</option><option>HSE</option><option>GA</option>
        <option>Utility & Maintenance</option><option>Office</option>
      </select>
      <span id="filter-count" class="text-xs text-gray-500 ml-auto"></span>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tanggal</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tipe</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Kategori</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Pelapor</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Dept</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Aksi</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div id="empty-state" class="hidden p-10 text-center text-gray-400">
      <p class="text-3xl mb-2">📋</p>
      <p class="text-sm">Belum ada laporan</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden">
  <div id="modal-inner"></div>
</div>

<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzTG9Hs62r2eDumzLAFvgLDwdUHBLQV-5tC12XajU0u_dY2Y8PPq-US2GXiycsEzav7/exec';
const KEY='safetrack_reports';
const ADMIN_PASS='admin123';
let reports=[];

function load(){try{reports=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){reports=[];}}
function save(){localStorage.setItem(KEY,JSON.stringify(reports));}
function fmtDT(v){if(!v)return'-';const d=new Date(v);return isNaN(d.getTime())?String(v):d.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function statusCls(s){if(s==='Menunggu Konfirmasi')return'status-waiting';if(s==='Diproses')return'status-processing';if(s==='Selesai')return'status-completed';return'status-needs-attention';}
function toast(msg,type='success'){const c=document.getElementById('toast-container');const el=document.createElement('div');el.className=`${type==='success'?'bg-emerald-500':'bg-red-500'} text-white px-5 py-3 rounded-xl shadow-lg text-sm fade-in`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}

function doLogin(){
  const pass=document.getElementById('admin-pass').value;
  const name=document.getElementById('admin-name').value.trim();
  if(pass!==ADMIN_PASS){toast('Password salah!','error');return;}
  if(!name){toast('Masukkan nama Anda','error');return;}
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-panel').classList.remove('hidden');
  document.getElementById('welcome-text').textContent=`Selamat datang, Admin ${name}!`;
  loadAndRender();
}
function doLogout(){
  document.getElementById('admin-panel').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-pass').value='';
}

async function fetchCloud(){
  try {
    const r=await fetch(`${API}?action=getReports&_=${Date.now()}`,{mode:'cors',cache:'no-store'});
    if(!r.ok)throw new Error();
    const p=await r.json();
    if(p.status!=='success'||!Array.isArray(p.reports))throw new Error();
    return p.reports.filter(r=>r.__backendId);
  } catch(e) {
    return new Promise((res)=>{
      const cb=`stJ_${Date.now()}`;const s=document.createElement('script');
      const clean=()=>{s.parentNode?.removeChild(s);delete window[cb];};
      window[cb]=p=>{clean();p?.status==='success'&&Array.isArray(p.reports)?res(p.reports.filter(r=>r.__backendId)):res([]);};
      s.onerror=()=>{clean();res([]);};
      s.src=`${API}?action=getReports&callback=${cb}&_=${Date.now()}`;
      document.body.appendChild(s);
    });
  }
}

async function syncCloud(rs){
  if(!rs.length)return;
  try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'syncAll',reports:rs.map(r=>({backendId:r.__backendId,date:r.report_date||'',type:r.type||'',category:r.category||'',reporter:r.reporter_name||'',department:r.department||'',location:r.location||'',status:r.status||'',priority:r.priority||'Normal',details:r.details||'',description:r.description||'',boxType:r.box_type||'',itemsStatus:r.items_status||'',adminNotes:r.admin_notes||'',completedDate:r.completed_date||''}))})});}catch(e){}
}

async function deleteCloud(id){
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'deleteReport',backendId:id})});
    const p=await r.json();return p.status==='success';
  }catch(e){return false;}
}

async function loadAndRender(){
  load();
  updateStats();renderTable();
  const cloud=await fetchCloud();
  const m=new Map();cloud.forEach(r=>m.set(r.__backendId,r));
  reports.forEach(r=>{if(r.__backendId&&!m.has(r.__backendId))m.set(r.__backendId,r);});
  reports=Array.from(m.values()).sort((a,b)=>new Date(b.report_date||0)-new Date(a.report_date||0));
  save();updateStats();renderTable();
}

async function refreshData(){
  toast('Memuat ulang data...','info');
  await loadAndRender();
  toast('Data berhasil diperbarui!');
}

function updateStats(){
  document.getElementById('s-total').textContent=reports.length;
  document.getElementById('s-waiting').textContent=reports.filter(r=>r.status==='Menunggu Konfirmasi').length;
  document.getElementById('s-done').textContent=reports.filter(r=>r.status==='Selesai').length;
  document.getElementById('s-attention').textContent=reports.filter(r=>['Perlu Perbaikan','Perlu Isi Ulang','Tidak Layak Pakai'].includes(r.status)).length;
}

function renderTable(){
  const typeF=document.getElementById('filter-type').value;
  const statusF=document.getElementById('filter-status').value;
  const deptF=document.getElementById('filter-dept').value;
  let filtered=reports;
  if(typeF)filtered=filtered.filter(r=>r.type===typeF);
  if(statusF)filtered=filtered.filter(r=>r.status===statusF);
  if(deptF)filtered=filtered.filter(r=>r.department===deptF);
  document.getElementById('filter-count').textContent=`${filtered.length} laporan`;
  const tbody=document.getElementById('table-body');
  const empty=document.getElementById('empty-state');
  if(!filtered.length){tbody.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  tbody.innerHTML=filtered.map(r=>`
    <tr class="hover:bg-gray-50 transition-colors">
      <td class="px-4 py-3 text-xs text-gray-600 whitespace-nowrap">${fmtDT(r.report_date)}</td>
      <td class="px-4 py-3 text-xs text-gray-800 font-medium">${r.type}</td>
      <td class="px-4 py-3 text-xs text-gray-600">${r.category||'-'}</td>
      <td class="px-4 py-3 text-xs text-gray-600">${r.reporter_name}</td>
      <td class="px-4 py-3 text-xs text-gray-600">${r.department}</td>
      <td class="px-4 py-3"><span class="status-badge ${statusCls(r.status)}">${r.status}</span></td>
      <td class="px-4 py-3">
        <div class="flex gap-1">
          <button onclick="viewDetail('${r.__backendId}')" class="px-2 py-1 bg-blue-100 text-blue-700 rounded-lg text-xs font-medium hover:bg-blue-200">Detail</button>
          <button onclick="updateStatus('${r.__backendId}')" class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-lg text-xs font-medium hover:bg-emerald-200">Update</button>
          <button onclick="confirmDelete('${r.__backendId}')" class="px-2 py-1 bg-red-100 text-red-700 rounded-lg text-xs font-medium hover:bg-red-200">Hapus</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function showModal(html){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-inner').innerHTML=html;
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}

function viewDetail(id){
  const r=reports.find(x=>x.__backendId===id);if(!r)return;
  showModal(`
    <div class="modal-overlay fixed inset-0 flex items-center justify-center p-4" onclick="closeModal()">
      <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto fade-in" onclick="event.stopPropagation()">
        <div class="p-5 border-b border-gray-100 flex items-center justify-between">
          <h2 class="text-lg font-bold text-gray-800">Detail Laporan</h2>
          <button onclick="closeModal()" class="p-1 hover:bg-gray-100 rounded-full">✕</button>
        </div>
        <div class="p-5 space-y-3">
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div><p class="text-xs text-gray-400">Tipe</p><p class="font-semibold">${r.type}</p></div>
            <div><p class="text-xs text-gray-400">Kategori</p><p class="font-semibold">${r.category||'-'}</p></div>
            <div><p class="text-xs text-gray-400">Pelapor</p><p class="font-semibold">${r.reporter_name}</p></div>
            <div><p class="text-xs text-gray-400">Departemen</p><p class="font-semibold">${r.department}</p></div>
            <div><p class="text-xs text-gray-400">Lokasi</p><p class="font-semibold">${r.location||'-'}</p></div>
            <div><p class="text-xs text-gray-400">Tanggal</p><p class="font-semibold">${fmtDT(r.report_date)}</p></div>
            <div><p class="text-xs text-gray-400">Prioritas</p><p class="font-semibold">${r.priority||'Normal'}</p></div>
            <div><p class="text-xs text-gray-400">Status</p><span class="status-badge ${statusCls(r.status)}">${r.status}</span></div>
          </div>
          <div><p class="text-xs text-gray-400 mb-1">Detail</p><p class="text-sm bg-gray-50 p-3 rounded-lg">${r.details||'-'}</p></div>
          <div><p class="text-xs text-gray-400 mb-1">Deskripsi</p><p class="text-sm bg-gray-50 p-3 rounded-lg">${r.description||'-'}</p></div>
          ${r.items_status?`<div><p class="text-xs text-gray-400 mb-1">Status Item P3K</p><p class="text-sm bg-gray-50 p-3 rounded-lg">${r.items_status}</p></div>`:''}
          ${r.admin_notes?`<div><p class="text-xs text-gray-400 mb-1">Catatan Admin</p><p class="text-sm bg-blue-50 p-3 rounded-lg">${r.admin_notes}</p></div>`:''}
        </div>
      </div>
    </div>
  `);
}

function updateStatus(id){
  const r=reports.find(x=>x.__backendId===id);if(!r)return;
  showModal(`
    <div class="modal-overlay fixed inset-0 flex items-center justify-center p-4" onclick="closeModal()">
      <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full fade-in" onclick="event.stopPropagation()">
        <div class="p-5 border-b border-gray-100">
          <h2 class="text-lg font-bold text-gray-800">Update Status</h2>
          <p class="text-sm text-gray-500">${r.type} – ${r.category||''}</p>
        </div>
        <div class="p-5 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select id="new-status" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl bg-white focus:outline-none">
              <option ${r.status==='Menunggu Konfirmasi'?'selected':''}>Menunggu Konfirmasi</option>
              <option ${r.status==='Diproses'?'selected':''}>Diproses</option>
              <option ${r.status==='Selesai'?'selected':''}>Selesai</option>
              <option ${r.status==='Perlu Perbaikan'?'selected':''}>Perlu Perbaikan</option>
              <option ${r.status==='Perlu Isi Ulang'?'selected':''}>Perlu Isi Ulang</option>
              <option ${r.status==='Tidak Layak Pakai'?'selected':''}>Tidak Layak Pakai</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Catatan Admin</label>
            <textarea id="new-notes" rows="3" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none resize-none">${r.admin_notes||''}</textarea>
          </div>
          <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-2 border border-gray-200 rounded-xl text-sm hover:bg-gray-50">Batal</button>
            <button onclick="saveStatus('${id}')" id="save-btn" class="flex-1 py-2 bg-emerald-500 text-white rounded-xl text-sm font-semibold hover:bg-emerald-600">Simpan</button>
          </div>
        </div>
      </div>
    </div>
  `);
}

async function saveStatus(id){
  const r=reports.find(x=>x.__backendId===id);if(!r)return;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.innerHTML='<div class="loader mx-auto" style="width:16px;height:16px"></div>';
  r.status=document.getElementById('new-status').value;
  r.admin_notes=document.getElementById('new-notes').value.trim();
  if(r.status==='Selesai')r.completed_date=new Date().toISOString().split('T')[0];
  save();await syncCloud(reports);updateStats();renderTable();
  closeModal();toast('Status berhasil diupdate!');
}

let deleteId=null;
function confirmDelete(id){
  deleteId=id;
  showModal(`
    <div class="modal-overlay fixed inset-0 flex items-center justify-center p-4" onclick="closeModal()">
      <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full fade-in text-center p-6" onclick="event.stopPropagation()">
        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-1">Hapus Laporan?</h3>
        <p class="text-gray-500 text-sm mb-5">Tindakan ini tidak dapat dibatalkan.</p>
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 py-2 border border-gray-200 rounded-xl text-sm hover:bg-gray-50">Batal</button>
          <button onclick="execDelete()" id="del-btn" class="flex-1 py-2 bg-red-500 text-white rounded-xl text-sm font-semibold hover:bg-red-600">Hapus</button>
        </div>
      </div>
    </div>
  `);
}

async function execDelete(){
  if(!deleteId)return;
  const btn=document.getElementById('del-btn');
  btn.disabled=true;btn.innerHTML='Menghapus...';
  const ok=await deleteCloud(deleteId);
  if(ok){
    reports=reports.filter(r=>r.__backendId!==deleteId);
    save();updateStats();renderTable();
    closeModal();toast('Laporan berhasil dihapus!');
    deleteId=null;
  } else {
    // Hapus lokal saja jika cloud gagal
    reports=reports.filter(r=>r.__backendId!==deleteId);
    save();updateStats();renderTable();
    closeModal();toast('Laporan dihapus (lokal). Sinkronisasi cloud mungkin perlu dicoba ulang.','info');
    deleteId=null;
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
