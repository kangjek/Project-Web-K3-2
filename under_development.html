  <title>Sedang Dalam Pengembangan</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sora', sans-serif; }

    .gear-spin { animation: spin 8s linear infinite; }
    .gear-spin-reverse { animation: spin 12s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .float-y { animation: floatY 3s ease-in-out infinite; }
    @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    .pulse-dot { animation: pulseDot 1.5s ease-in-out infinite; }
    .pulse-dot:nth-child(2) { animation-delay: 0.3s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulseDot { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

    .fade-up { animation: fadeUp 0.8s ease-out both; }
    .fade-up-d1 { animation-delay: 0.15s; }
    .fade-up-d2 { animation-delay: 0.3s; }
    .fade-up-d3 { animation-delay: 0.45s; }
    .fade-up-d4 { animation-delay: 0.6s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .progress-bar { animation: progressAnim 3s ease-in-out infinite; }
    @keyframes progressAnim { 0% { width: 20%; } 50% { width: 70%; } 100% { width: 20%; } }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: blobMove 10s ease-in-out infinite alternate;
    }
    @keyframes blobMove { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,-20px) scale(1.15); } }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto relative flex items-center justify-center" style="background: #0c0f1a;"><!-- Blobs -->
   <div class="blob" style="width:340px;height:340px;background:#6d28d9;top:-60px;left:-80px;"></div>
   <div class="blob" style="width:280px;height:280px;background:#2563eb;bottom:-40px;right:-60px;animation-delay:3s;"></div>
   <div class="blob" style="width:200px;height:200px;background:#06b6d4;top:40%;left:60%;animation-delay:6s;"></div>
   <div class="relative z-10 text-center px-6 py-12 max-w-lg w-full"><!-- Gears illustration -->
    <div class="fade-up flex items-center justify-center mb-8 relative">

     </svg>

    </div><!-- Title -->
    <h1 id="el-title" class="fade-up fade-up-d1 text-3xl sm:text-4xl font-bold tracking-tight" style="color:#e0e7ff;">Sedang Dalam Pengembangan</h1><!-- Subtitle -->
    <p id="el-subtitle" class="fade-up fade-up-d2 mt-3 text-lg font-light" style="color:#818cf8;">Kami sedang membangun sesuatu yang luar biasa</p><!-- Progress bar -->
    <div class="fade-up fade-up-d2 mt-6 mx-auto max-w-xs h-1.5 rounded-full overflow-hidden" style="background:#1e2340;">

    </div><!-- Loading dots -->
    <div class="fade-up fade-up-d2 flex justify-center gap-2 mt-5"><span class="pulse-dot w-2 h-2 rounded-full inline-block" style="background:#818cf8;"></span> <span class="pulse-dot w-2 h-2 rounded-full inline-block" style="background:#818cf8;"></span> <span class="pulse-dot w-2 h-2 rounded-full inline-block" style="background:#818cf8;"></span>
    </div><!-- Description -->
    <p id="el-description" class="fade-up fade-up-d3 mt-6 text-sm leading-relaxed max-w-sm mx-auto" style="color:#94a3b8;">Halaman ini sedang dalam tahap pengembangan. Silakan kembali lagi nanti untuk melihat pembaruan terbaru.</p><!-- Button -->
    <div class="fade-up fade-up-d4 mt-8"><button id="el-button" onclick="location.reload()" class="inline-flex items-center gap-2 px-6 py-3 rounded-full text-sm font-semibold transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-indigo-500/25" style="background: linear-gradient(135deg, #6d28d9, #2563eb); color: #e0e7ff;"> <i data-lucide="refresh-cw" style="width:16px;height:16px;"></i> <span id="el-button-text">Muat Ulang</span> </button>
    </div>

  <script>
    lucide.createIcons();

    const defaultConfig = {
      main_title: 'Sedang Dalam Pengembangan',
      subtitle_text: 'Kami sedang membangun sesuatu yang luar biasa',
      description_text: 'Halaman ini sedang dalam tahap pengembangan. Silakan kembali lagi nanti untuk melihat pembaruan terbaru.',
      button_text: 'Muat Ulang',
      background_color: '#0c0f1a',
      accent_color: '#6d28d9',
      highlight_color: '#2563eb',
      text_color: '#e0e7ff',
      muted_color: '#818cf8',
      font_family: 'Sora',
      font_size: 16
    };

    async function onConfigChange(config) {
      const c = { ...defaultConfig, ...config };
      const app = document.getElementById('app');
      app.style.background = c.background_color;

      document.getElementById('el-title').textContent = c.main_title;
      document.getElementById('el-title').style.color = c.text_color;
      document.getElementById('el-title').style.fontFamily = `${c.font_family}, sans-serif`;
      document.getElementById('el-title').style.fontSize = `${c.font_size * 2.2}px`;

      document.getElementById('el-subtitle').textContent = c.subtitle_text;
      document.getElementById('el-subtitle').style.color = c.muted_color;
      document.getElementById('el-subtitle').style.fontFamily = `${c.font_family}, sans-serif`;
      document.getElementById('el-subtitle').style.fontSize = `${c.font_size * 1.1}px`;

      document.getElementById('el-description').textContent = c.description_text;
      document.getElementById('el-description').style.color = c.muted_color;
      document.getElementById('el-description').style.fontFamily = `${c.font_family}, sans-serif`;
      document.getElementById('el-description').style.fontSize = `${c.font_size * 0.875}px`;

      document.getElementById('el-button-text').textContent = c.button_text;
      document.getElementById('el-button').style.background = `linear-gradient(135deg, ${c.accent_color}, ${c.highlight_color})`;
      document.getElementById('el-button').style.color = c.text_color;
      document.getElementById('el-button').style.fontFamily = `${c.font_family}, sans-serif`;

      document.querySelectorAll('.pulse-dot').forEach(d => d.style.background = c.muted_color);
    }

    function makeMutable(key) {
      return {
        get: () => (window.elementSdk.config && window.elementSdk.config[key]) || defaultConfig[key],
        set: (v) => { window.elementSdk.setConfig({ [key]: v }); }
      };
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange,
      mapToCapabilities: (config) => ({
        recolorables: [
          makeMutable('background_color'),
          makeMutable('muted_color'),
          makeMutable('text_color'),
          makeMutable('accent_color'),
          makeMutable('highlight_color')
        ],
        borderables: [],
        fontEditable: makeMutable('font_family'),
        fontSizeable: makeMutable('font_size')
      }),
      mapToEditPanelValues: (config) => new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text],
        ['description_text', config.description_text || defaultConfig.description_text],
        ['button_text', config.button_text || defaultConfig.button_text]
      ])
    });
  </script>
